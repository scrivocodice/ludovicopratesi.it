{% load staticfiles %}

{% for exhibit in exhibits %}
  <div class="modal fade" id="{{ exhibit.modal_id }}" tabindex="-1" aria-labelledby="{{ exhibit.modal_id }}Label" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content preview-modal">
        <div class="preview-modal__image" style="background-image: url('{% static exhibit.image %}');"></div>
        <div class="modal-header">
          <div>
            <div class="card-kicker">{{ exhibit.category }}</div>
            <h2 id="{{ exhibit.modal_id }}Label" class="modal-title fs-2">{{ exhibit.title }}</h2>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <p class="card-summary mb-3">{{ exhibit.summary }}</p>
          <div class="card-meta mb-0">
            <span>{{ exhibit.location }}</span>
            <span>{{ exhibit.period }}</span>
          </div>
          <ul class="preview-modal__list">
            {% for detail in exhibit.details %}
              <li>{{ detail }}</li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </div>
{% endfor %}

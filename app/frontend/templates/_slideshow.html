{% load i18n %}
<ul {% if exhibit.images.all.count > 1  %}data-orbit{% endif %}>
  {% for image in exhibit.images.all %}
  <li {% if exhibit.images.all.count <= 1  %}class="active"{% endif %}>
  <img alt="{% blocktrans %}Picture exhibit {{ exhibit }}{% endblocktrans %}" src="{{ image.filename.show.url }}">
  </li>
  {% empty %}
  <li {% if exhibit.images.all.count <= 1  %}class="active"{% endif %}>
    <img src="https://placehold.it/637x388&text=no img">
  </li>
  {% endfor %}
</ul>
